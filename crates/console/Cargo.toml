[package]
name = "console"
version = "0.1.0"
edition.workspace = true
license.workspace = true
authors.workspace = true
description = "larkstack admin console — single-binary supervisor + Web UI"

[[bin]]
name = "larkstack-console"
path = "src/main.rs"

[dependencies]
axum = { workspace = true, features = ["tokio", "http1", "json", "macros"] }
tokio = { workspace = true, features = [
    "rt-multi-thread",
    "macros",
    "time",
    "signal",
    "sync",
    "net",
] }
tokio-stream = { version = "0.1", features = ["sync"] }
futures-util = { version = "0.3", default-features = false, features = ["std"] }
serde = { workspace = true }
serde_json = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
anyhow = { workspace = true }
mime_guess = "2"
rust-embed = { version = "8", features = ["debug-embed"] }

control = { path = "../control" }
linear-bridge = { path = "../linear-bridge", default-features = false, features = [
    "native",
] }
